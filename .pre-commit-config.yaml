# Pre-commit hooks — activates after `pip install pre-commit && pre-commit install`.
# Prepared in Phase S1.2. Inert until git init + pre-commit install.
#
# Run manually: pre-commit run --all-files
# Update: pre-commit autoupdate

repos:
  # ---- Secret scanning (PRIMARY DEFENCE — runs first) ----
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (scan for committed secrets)
        description: Detect hardcoded secrets like passwords, api keys, tokens.

  # ---- Generic file hygiene ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
      - id: check-yaml
      - id: check-json
      - id: check-toml

  # ---- Python: ruff lint + format ----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^apps/api/.*\.py$
      - id: ruff-format
        files: ^apps/api/.*\.py$

  # ---- Python: bandit security linter ----
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        name: bandit (Python security linter)
        files: ^apps/api/aicmo/.*\.py$
        # Skip B101 (assert_used) — pytest uses asserts.
        # Skip B311 (random) — rate-limit cleanup uses random for sampling, not crypto.
        args: ["--skip", "B101,B311", "-r"]
        exclude: ^apps/api/tests/

  # ---- Frontend: ESLint via pnpm ----
  - repo: local
    hooks:
      - id: pnpm-lint-web
        name: pnpm lint (apps/web)
        entry: bash -c 'cd apps/web && pnpm lint --fix'
        language: system
        files: ^apps/web/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
