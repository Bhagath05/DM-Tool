services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-cmo-postgres
    restart: unless-stopped
    # P1: preload pg_stat_statements for slow-query observability. Requires a
    # restart to take effect; migration 0045 then runs CREATE EXTENSION.
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "pg_stat_statements.max=10000"
    environment:
      POSTGRES_USER: aicmo
      POSTGRES_PASSWORD: aicmo
      POSTGRES_DB: aicmo
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicmo -d aicmo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-cmo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
