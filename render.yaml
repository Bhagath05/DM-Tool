# Render Blueprint — DM Tool backend.
#
# The Next.js frontend (apps/web) is deployed separately on Vercel.
# This blueprint provisions the full backend stack:
#   - dm-tool-api     FastAPI web service (runs Alembic migrations pre-deploy)
#   - dm-tool-worker  Arq background worker (publish scheduler + monitor cron)
#   - dm-tool-db      Managed PostgreSQL
#   - dm-tool-redis   Managed Redis (Arq broker)
#
# DATABASE_URL is injected by Render as `postgresql://…` (driver-less). The
# config layer (aicmo/config.py::_force_async_psycopg3_driver) rewrites it to
# `postgresql+psycopg://…` automatically — no manual URL editing required.
#
# ─────────────────────────────────────────────────────────────────────────
# GOING TO PRODUCTION — checklist (the app REFUSES to boot if any is missing;
# see aicmo/config.py::validate_production_secrets):
#   1. API_ENV=production   (removes debug router; enables prod Sentry env)
#   2. AUTH_MODE=clerk       + CLERK_SECRET_KEY / CLERK_JWT_ISSUER /
#      CLERK_JWKS_URL / CLERK_JWT_AUDIENCE  (real authentication)
#   3. REDIS_URL             must be the managed Redis (NOT localhost — the
#      boot guard rejects localhost in production; worker/queue depend on it)
#   4. SENTRY_DSN, IP_HASH_PEPPER, MEDIA_SIGNING_SECRET, INTEGRATION_TOKEN_KEY
#   5. The default LLM provider key (ANTHROPIC_API_KEY by default)
#   6. MEDIA_BACKEND=r2/s3 + S3_BUCKET + creds  (durable generated media)
# Deploying FROM this blueprint wires DATABASE_URL + REDIS_URL automatically
# via fromDatabase/fromService — a manually-created service does not.
# ─────────────────────────────────────────────────────────────────────────

databases:
  - name: dm-tool-db
    databaseName: dmtool
    user: dmtool
    plan: basic-256mb        # smallest paid; use `free` for a trial

services:
  # -------------------------------------------------------------------
  # Redis — Arq broker. Web app degrades gracefully if it's down, but the
  # worker requires it.
  # -------------------------------------------------------------------
  - type: redis
    name: dm-tool-redis
    plan: free
    maxmemoryPolicy: noeviction   # never drop queued jobs
    ipAllowList: []               # internal-only (other Render services)

  # -------------------------------------------------------------------
  # FastAPI web service
  # -------------------------------------------------------------------
  - type: web
    name: dm-tool-api
    runtime: python
    rootDir: apps/api
    plan: starter
    buildCommand: pip install uv && uv sync --frozen --no-dev
    # Render Free has no Pre-Deploy hook, so migrations run inside start.sh
    # (alembic upgrade head → uvicorn) before the port is bound.
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dm-tool-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: dm-tool-redis
          property: connectionString
      # CORS — the Vercel frontend origin(s), comma-separated.
      - key: API_CORS_ORIGINS
        value: https://dm-tool-web.vercel.app
      # Demo posture (boots without Clerk/secret bundle). For real auth set
      # API_ENV=production + AUTH_MODE=clerk + the secret bundle below.
      - key: API_ENV
        value: staging
      - key: AUTH_MODE
        value: demo
      - key: PYTHONUNBUFFERED
        value: "1"
      # ---- Secrets (set in the Render dashboard; never commit) ----
      # Needed for AI generation to actually run (LLM_DEFAULT_PROVIDER=anthropic):
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      # Required ONLY when going to real production (API_ENV=production):
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWT_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_JWT_AUDIENCE
        sync: false
      - key: IP_HASH_PEPPER
        sync: false
      - key: MEDIA_SIGNING_SECRET
        sync: false
      - key: INTEGRATION_TOKEN_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      # ---- Durable storage (Priority 6) ----
      # Generated media survives deploys only on an object store. Render's
      # disk is ephemeral + not shared between web/worker, so with the
      # `local` default in production `media_persistence_available` disables
      # image/export generation. Set MEDIA_BACKEND=r2/s3 + the creds below to
      # turn durable media ON. R2: MEDIA_BACKEND=r2 + S3_ENDPOINT_URL.
      - key: MEDIA_BACKEND
        value: local            # set to "s3" or "r2" for production media
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false             # Cloudflare R2 / MinIO endpoint (blank for AWS)
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

  # -------------------------------------------------------------------
  # Arq background worker — publish scheduler, system monitor, all jobs.
  # Shares the DB + Redis with the web service.
  # -------------------------------------------------------------------
  - type: worker
    name: dm-tool-worker
    runtime: python
    rootDir: apps/api
    plan: starter
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run arq aicmo.queue.worker.WorkerSettings
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dm-tool-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: dm-tool-redis
          property: connectionString
      - key: JOBS_ENABLED
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
      # The worker runs the same jobs the API enqueues — content/media
      # generation, publishing, the daily operations cycle — so it needs the
      # same secrets, not just Anthropic. Missing keys here mean jobs fail at
      # run time (not boot), which is exactly the kind of silent gap the
      # stabilization pass is closing.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: INTEGRATION_TOKEN_KEY
        sync: false
      - key: MEDIA_SIGNING_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      # Durable media for worker-generated assets (must match the API's).
      - key: MEDIA_BACKEND
        value: local
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
